<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎬 MovieHub</h1>
    <input type="text" id="search" placeholder="Search movies...">
  </header>

  <section class="movies" id="movieContainer">

    <div class="movie-card">
      <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1000" alt="Movie Poster">

      <div class="movie-info">
        <h2>Sample Movie</h2>
        <p>Action • Adventure • HD</p>

        <video controls>
          <source src="YOUR_MOVIE_LINK.mp4" type="video/mp4">
        </video>

        <div class="buttons">
          <a href="YOUR_MOVIE_LINK.mp4" target="_blank">
            <button class="watch-btn">▶ Watch</button>
          </a>

          <a href="YOUR_MOVIE_LINK.mp4" download>
            <button class="download-btn">⬇ Download</button>
          </a>
        </div>
      </div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
